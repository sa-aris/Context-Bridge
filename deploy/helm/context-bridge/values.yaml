replicaCount: 2

image:
  repository: context-bridge
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

service:
  type: ClusterIP
  port: 8000

# Application configuration -> rendered into a ConfigMap and injected as env.
config:
  QDRANT_URL: "http://qdrant:6333"
  DATABASE_URL: "postgresql+psycopg://bridge:bridge@postgres:5432/context_bridge"
  WORKING_PROVIDER: "redis"
  REDIS_URL: "redis://redis:6379/0"
  EMBED_PROVIDER: "fastembed"
  RATE_LIMIT_BACKEND: "redis"
  METRICS_ENABLED: "true"

# Sensitive values are referenced from an existing Secret instead of the ConfigMap.
# Map of ENV_VAR -> {secretName, key}.
secretEnv: {}
  # API_KEYS:
  #   secretName: context-bridge-secrets
  #   key: api-keys

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: context-bridge.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

nodeSelector: {}
tolerations: []
affinity: {}
