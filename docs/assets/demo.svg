<svg xmlns="http://www.w3.org/2000/svg" width="900" height="452" viewBox="0 0 900 452" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="13.5">
  <rect width="900" height="452" rx="10" fill="#0d1117"/>
  <rect width="900" height="34" rx="10" fill="#161b22"/>
  <rect y="24" width="900" height="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="450" y="22" text-anchor="middle" fill="#8b949e">context bridge — quickstart</text>

  <text x="24" y="64" fill="#8b949e">$ <tspan fill="#c9d1d9">python examples/quickstart.py</tspan></text>

  <text x="24" y="96" fill="#56d4dd" font-weight="bold">── Three agents write into one shared pool</text>
  <text x="24" y="116" fill="#7d8590">wrote 3 memories  ·  billing-agent, ops-agent, api-agent</text>

  <text x="24" y="148" fill="#56d4dd" font-weight="bold">── A fourth agent recalls — only what the task needs</text>
  <text x="24" y="170"><tspan fill="#3fb950">  ✓ </tspan><tspan fill="#8b949e">[billing-agent] </tspan><tspan fill="#e6edf3">The payment service uses Stripe and retries failed charges three times.</tspan></text>
  <text x="24" y="188" fill="#6e7681">        why: match 0.0328, recent</text>
  <text x="24" y="210"><tspan fill="#3fb950">  ✓ </tspan><tspan fill="#8b949e">[api-agent] </tspan><tspan fill="#e6edf3">Checkout calls the payment service synchronously with a 5s timeout.</tspan></text>
  <text x="24" y="228" fill="#6e7681">        why: match 0.0323, recent</text>
  <text x="24" y="250" fill="#e6edf3">  tokens_used: <tspan fill="#d2a8ff">28</tspan> (budget 256)</text>
  <text x="24" y="268" fill="#6e7681">  the coffee-machine note ranked last and was left out — recall stays relevant</text>

  <text x="24" y="300" fill="#56d4dd" font-weight="bold">── Learn from a mistake, then brief the next agent before it starts</text>
  <text x="24" y="322"><tspan fill="#d29922">  ⚠ (high) </tspan><tspan fill="#e6edf3">raise checkout's 5s timeout first, or synchronous calls will fail</tspan></text>

  <text x="24" y="354" fill="#56d4dd" font-weight="bold">── Close the loop, then read the namespace's pulse</text>
  <text x="24" y="376" fill="#e6edf3">  collaboration quality: <tspan fill="#3fb950" font-weight="bold">100.0/100</tspan></text>
  <text x="24" y="394" fill="#6e7681">  hit_rate 1.0  ·  feedback_positivity 1.0  ·  open_conflicts 0</text>

  <text x="24" y="428" fill="#3fb950" font-weight="bold">  ✓ shared, governed, explainable memory — all in-process</text>
</svg>
