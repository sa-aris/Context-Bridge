name: Release

on:
  # Cut a release by bumping the version and touching `.release-trigger`.
  push:
    branches: ["main"]
    paths: [".release-trigger"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Resolve version
        id: ver
        run: |
          v=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Remove stale 'v' tag/release if present
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v --repo "$GITHUB_REPOSITORY" --yes || true
          gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/v" || true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Context Bridge ${{ steps.ver.outputs.version }}
          body_path: .github/release-body.md
          make_latest: true
          files: |
            dist/*
            docs/assets/demo.gif

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    # Publishes via OIDC trusted publishing. Requires a PyPI trusted publisher
    # for this repo and a GitHub environment named 'pypi'.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
