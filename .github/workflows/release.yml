name: Release

on:
  # Cut a release by bumping the version and touching `.release-trigger`.
  push:
    branches: ["main"]
    paths: [".release-trigger"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Resolve version
        id: ver
        run: |
          v=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Remove stale 'v' tag/release if present
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v --repo "$GITHUB_REPOSITORY" --yes || true
          gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/v" || true
      - name: Set repo description, homepage and topics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api -X PATCH "repos/$GITHUB_REPOSITORY" \
               -f description='Shared neural memory for multi-agent LLM systems — agents write to one governed pool and recall only the task-scoped, token-budgeted slice they need. Local-first, hybrid retrieval, full provenance.' \
               -f homepage='https://pypi.org/project/context-bridge-memory/' >/dev/null \
             && gh api -X PUT "repos/$GITHUB_REPOSITORY/topics" \
               -f 'names[]=multi-agent' -f 'names[]=ai-agents' -f 'names[]=llm' \
               -f 'names[]=agent-memory' -f 'names[]=rag' -f 'names[]=retrieval-augmented-generation' \
               -f 'names[]=semantic-search' -f 'names[]=vector-database' -f 'names[]=qdrant' \
               -f 'names[]=embeddings' -f 'names[]=fastapi' -f 'names[]=python' \
               -f 'names[]=llmops' -f 'names[]=shared-memory' -f 'names[]=memory' >/dev/null; then
            echo "META_OK: description, homepage and topics set"
          else
            echo "META_FAILED: the CI token lacks repo-admin permission for metadata"
          fi
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Context Bridge ${{ steps.ver.outputs.version }}
          body_path: .github/release-body.md
          make_latest: true
          files: |
            dist/*
            docs/assets/demo.gif

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    # Publishes via OIDC trusted publishing. Requires a PyPI trusted publisher
    # for this repo and a GitHub environment named 'pypi'.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
