name: Release

on:
  # Cut a release by bumping the version and touching `.release-trigger`.
  push:
    branches: ["main"]
    paths: [".release-trigger"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Prepare release body
        run: |
          {
            echo '![demo](https://raw.githubusercontent.com/sa-aris/Context-Bridge/main/docs/assets/demo.gif)'
            echo
            sed '/<!--/,/-->/d' RELEASE_NOTES_v0.1.0.md
          } > body.md
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: Context Bridge 0.1.0
          body_path: body.md
          make_latest: true
          files: |
            dist/*
            docs/assets/demo.gif

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    # Publishes via OIDC trusted publishing. Requires a PyPI trusted publisher
    # for this repo and a GitHub environment named 'pypi'.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
